<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY MONITOR OS | Command Center</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <div id="desktop">
        <!-- Floating Window Area -->
        <div id="window-area"></div>

        <!-- Taskbar -->
        <div id="taskbar">
            <div id="start-btn" class="nav-btn" style="cursor: default">
                <i class="fa-solid fa-microchip"></i>
            </div>
            
            <div id="active-apps">
                <!-- App icons will spawn here -->
            </div>

            <div id="system-tray" style="align-items:center;">
                <span class="tray-icon" style="cursor:pointer; margin-right:15px; color:#fef08a; font-weight:bold;" onclick="window.desktop.createStickyNote()">
                    <i class="fa-solid fa-note-sticky"></i> POST-IT
                </span>
                <span id="weather-tray" style="margin-right:15px; color:var(--text-meta);">
                    <i class="fa-solid fa-cloud"></i> --°C Terrassa
                </span>
                <span id="clock" style="margin-right:15px; font-weight:700;">00:00:00</span>
            </div>
        </div>
    </div>

    <script src="js/desktop.js"></script>
</body>
</html>
